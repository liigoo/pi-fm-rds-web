<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pi FM RDS 控制台</title>
    <link rel="stylesheet" href="/static/css/main.css?v=202603310950">
</head>
<body>
    <div class="radio-shell">
        <main class="radio-container">
            <section class="spectrum-section panel-frame" aria-label="音频频谱区域">
                <header class="spectrum-header">
                    <div class="brand">
                        <h1>PI FM RDS CONSOLE</h1>
                        <p>Analog Broadcast Deck</p>
                    </div>
                    <div class="connection-status" id="connectionStatus" aria-live="polite">
                        <span class="status-dot"></span>
                        <span class="status-text">连接中...</span>
                    </div>
                </header>

                <div class="spectrum-screen">
                    <canvas id="spectrumCanvas" aria-label="实时频谱图"></canvas>
                </div>

                <div class="spectrum-footer">
                    <span class="mono-label">NOW PLAYING</span>
                    <span id="currentTrackName" class="track-now">--</span>
                    <span id="playStateBadge" class="state-badge stopped">已停止</span>
                </div>
            </section>

            <aside class="right-panel">
                <section class="fm-container panel-frame" aria-label="频率控制">
                    <div class="fm-display-wrap">
                        <h2>FM TUNER</h2>
                        <div class="fm-display">
                            <span class="frequency-value" id="frequencyValue">88.0</span>
                            <span class="frequency-unit">MHz</span>
                        </div>
                        <div class="station-name">0.1 精度调频</div>
                    </div>

                    <div class="freq-knob" id="freqKnob" aria-hidden="true">
                        <span class="knob-pointer"></span>
                    </div>

                    <div class="freq-inputs">
                        <input type="range" id="frequencySlider" min="87.5" max="108.0" step="0.1" value="88.0" class="frequency-slider" aria-label="频率滑块">
                        <input type="number" id="frequencyInput" min="87.5" max="108.0" step="0.1" value="88.0" class="frequency-input" aria-label="频率输入框">
                    </div>
                </section>

                <section class="file-section panel-frame" aria-label="文件与队列管理">
                    <div class="section-title-row">
                        <h2>FILE LIST</h2>
                        <div class="file-buttons">
                            <input type="file" id="uploadInput" accept="audio/*" hidden>
                            <button id="uploadBtn" class="btn">UPLOAD</button>
                            <button id="deleteSelectedBtn" class="btn btn-danger">DELETE</button>
                        </div>
                    </div>

                    <div class="file-list-box">
                        <table class="file-table">
                            <colgroup>
                                <col>
                                <col>
                                <col>
                            </colgroup>
                            <thead>
                                <tr>
                                    <th>文件名</th>
                                    <th>大小</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="fileListBody">
                                <tr>
                                    <td colspan="3" class="empty-row">暂无文件</td>
                                </tr>
                            </tbody>
                        </table>
                    </div>

                    <div class="queue-block">
                        <div class="queue-title">SEQUENTIAL QUEUE</div>
                        <div id="playlistContainer" class="playlist-container"></div>
                    </div>
                </section>

                <section class="control-section panel-frame" aria-label="播放控制">
                    <div class="section-title-row">
                        <h2>CONTROLS</h2>
                        <div class="status-row">
                            <span class="mono-label">STATUS</span>
                            <span id="statusText" class="status-stopped">已停止</span>
                        </div>
                    </div>

                    <div class="control-buttons transport-row">
                        <button id="prevBtn" class="btn btn-control" aria-label="上一曲"><span class="btn-icon">◀◀</span></button>
                        <button id="playBtn" class="btn btn-play-round" aria-label="播放"><span class="btn-icon">▶</span></button>
                        <button id="nextBtn" class="btn btn-control" aria-label="下一曲"><span class="btn-icon">▶▶</span></button>
                        <button id="pauseBtn" class="btn btn-control" aria-label="暂停"><span class="btn-icon">❚❚</span></button>
                        <button id="stopBtn" class="btn btn-stop" aria-label="停止"><span class="btn-icon">■</span></button>
                    </div>
                </section>
            </aside>
        </main>
    </div>

    <script src="/static/js/state.js?v=202603310950"></script>
    <script src="/static/js/api.js?v=202603310950"></script>
    <script src="/static/js/websocket.js?v=202603310950"></script>
    <script src="/static/js/spectrum.js?v=202603310950"></script>
    <script src="/static/js/files.js?v=202603310950"></script>
    <script src="/static/js/playlist.js?v=202603310950"></script>
    <script src="/static/js/controls.js?v=202603310950"></script>
    <script src="/static/js/app.js?v=202603310950"></script>
</body>
</html>
