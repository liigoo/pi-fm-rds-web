server:
  port: 8080
  host: "0.0.0.0"

pifmrds:
  binary_path: "/usr/local/bin/pi_fm_rds"
  default_frequency: 100.0

storage:
  upload_dir: "/data/pi-fm-rds/uploads"
  transcoded_dir: "/data/pi-fm-rds/cache"
  max_file_size: 104857600  # 100MB
  max_total_size: 2147483648  # 2GB

audio:
  sample_rate: 44100
  channels: 2

websocket:
  max_clients: 10
  spectrum_fps: 15
